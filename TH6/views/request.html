<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Trang Request & Headers</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 30px;
            background: #f8f9fa;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
        }

        input,
        button {
            padding: 10px;
            margin: 8px 0;
            width: 100%;
            box-sizing: border-box;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            background: #2ecc71;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #27ae60;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Kiểm tra Thông tin Request</h2>
        <p>Nhập thông tin vào form dưới đây để gửi một <b>GET Request</b> lên Server.</p>

        <form action="/request-info" method="GET" target="_blank">
            <label>Họ và tên của bạn:</label>
            <input type="text" name="fullname" placeholder="Ví dụ: Quốc Việt" required>

            <label>Mã Sinh Viên:</label>
            <input type="text" name="studentId" placeholder="Ví dụ: IS2026" required>

            <button type="submit">Gửi Request & Xem Header</button>
        </form>
        <hr>
        <a href="/" style="text-decoration: none; color: #3498db;">← Về Trang chủ</a>
    </div>
</body>

</html>
